openapi: 3.0.3
info:
  title: OpenViking Snapshot API
  description: |
    OpenViking 快照（版本化）API。
    基于 Git 协议实现按目录粒度的版本管理，支持快照创建、查询、回滚。
  version: 1.0.0
servers:
  - url: /api/v1
paths:
  /snapshot/create:
    post:
      summary: 创建目录快照
      description: |
        为指定目录创建一个快照（相当于 git commit -m <message> -- <uri>）。
        快照内容包括目录下所有文件，可选包含向量数据。
      operationId: createSnapshot
      tags:
        - snapshot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSnapshotRequest'
      responses:
        '200':
          description: 快照创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                success:
                  value:
                    status: "ok"
                    result:
                      commit_id: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0"
                      short_id: "a1b2c3d4"
                      message: "projectA: add login feature"
                      timestamp: 1717209600
                      files_changed: 5
        '400':
          description: 参数错误
        '404':
          description: 目录不存在
        '500':
          description: 服务端错误
  /snapshot/get:
    get:
      summary: 获取快照详情
      description: 根据 commit_id 获取快照的元信息和文件列表
      operationId: getSnapshot
      tags:
        - snapshot
      security:
        - bearerAuth: []
      parameters:
        - name: uri
          in: query
          required: true
          schema:
            type: string
          description: 目录 URI（如 viking://resources/projectA）
        - name: commit_id
          in: query
          required: true
          schema:
            type: string
          description: 提交 ID（完整 40 位或短 8 位）
        - name: include_files
          in: query
          schema:
            type: boolean
            default: true
          description: 是否返回文件列表
      responses:
        '200':
          description: 快照详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /snapshot/restore:
    post:
      summary: 回滚到指定快照
      description: |
        将目录恢复到指定快照的状态（相当于 git checkout <commit_id> -- <uri>）。
        默认会覆盖原目录，设置 create_new=true 可创建新目录而不修改原目录。
      operationId: restoreSnapshot
      tags:
        - snapshot
      security:
        - bearerAuth: []
      parameters:
        - name: commit_id
          in: query
          required: true
          schema:
            type: string
          description: 目标提交 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreSnapshotRequest'
      responses:
        '200':
          description: 回滚成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 参数错误
        '404':
          description: 快照或目录不存在
  /snapshot/file:
    get:
      summary: 获取快照中的文件内容
      description: |
        获取指定快照中某个文件的内容（相当于 git show <commit_id>:<file_path>）。
        可选同时返回向量数据。
      operationId: getFileAtSnapshot
      tags:
        - snapshot
      security:
        - bearerAuth: []
      parameters:
        - name: uri
          in: query
          required: true
          schema:
            type: string
          description: 目录 URI
        - name: file_path
          in: query
          required: true
          schema:
            type: string
          description: 相对于 uri 的文件路径
        - name: commit_id
          in: query
          required: true
          schema:
            type: string
          description: 提交 ID
        - name: include_vector
          in: query
          schema:
            type: boolean
            default: false
          description: 是否同时返回向量数据
      responses:
        '200':
          description: 文件内容
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: 快照或文件不存在
  /snapshot/copy:
    post:
      summary: 将快照内容复制到新目录
      description: |
        将指定 commit 中某个目录的内容复制到一个新目录（不修改原目录）。
        相当于 `git checkout <commit_id> -- <src>` 到新位置。
      operationId: copySnapshotTo
      tags:
        - snapshot
      security:
        - bearerAuth: []
      parameters:
        - name: commit_id
          in: query
          required: true
          schema:
            type: string
          description: 源提交 ID
        - name: src_uri
          in: query
          required: true
          schema:
            type: string
          description: 源目录 URI（相对于仓库根目录）
        - name: dest_uri
          in: query
          required: true
          schema:
            type: string
          description: 目标目录 URI
      responses:
        '200':
          description: 复制成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              examples:
                success:
                  value:
                    status: "ok"
                    result:
                      dest_uri: "viking://resources/projectA_backup"
                      files_copied: 12
                      total_size: 102400
        '400':
          description: 参数错误
        '404':
          description: 快照或源目录不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ApiResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok, error]
          example: "ok"
        result:
          type: object
          description: 响应结果
        error:
          type: object
          description: 错误信息
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
        telemetry:
          type: object
          description: 遥测数据
        profile:
          type: array
          items:
            type: string
          description: 性能分析数据
    CreateSnapshotRequest:
      type: object
      required:
        - uri
      properties:
        uri:
          type: string
          description: 要快照的目录 URI（如 viking://resources/projectA）
          example: "viking://resources/projectA"
        message:
          type: string
          description: 快照说明
          example: "projectA: add login feature"
        wait:
          type: boolean
          default: true
          description: 是否等待处理完成
        timeout:
          type: number
          description: 超时时间（秒）
        include_vectors:
          type: boolean
          default: true
          description: 是否包含向量数据
    RestoreSnapshotRequest:
      type: object
      required:
        - uri
      properties:
        uri:
          type: string
          description: 要回滚的目录 URI
          example: "viking://resources/projectA"
        create_new:
          type: boolean
          default: false
          description: |
            是否创建新目录而不修改原目录。
            为 true 时，会创建 uri + "_backup" 的新目录。
        reindex:
          type: boolean
          default: true
          description: 是否重新构建向量索引
        wait:
          type: boolean
          default: true
          description: 是否等待处理完成
        timeout:
          type: number
          description: 超时时间（秒）
tags:
  - name: snapshot
    description: 快照（版本化）相关接口
